<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>Hw3</title>
  </head>

  <body>
    <div id="tax-box">
      <h2>โปรแกรมคำนวณภาษีเงินได้บุคคลธรรมดา</h2>

      <form>
        <label>รายได้ (บาท)</label><br />
        <input
          type="number"
          id="income"
          oninput="calculate()"
          onkeydown="return event.keyCode !== 69;"
        />
        <button type="button" onclick="add()">+</button>
        <button type="button" onclick="remove()">-</button>
        <br /><br />

        <input
          type="number"
          id="income2"
          style="display: none"
          oninput="calculate()"
          onkeydown="return event.keyCode !== 69;"
        /><br />

        <input
          type="number"
          id="income3"
          style="display: none"
          oninput="calculate()"
          onkeydown="return event.keyCode !== 69;"
        /><br /><br />

        <label>รายได้รวม (บาท)</label><br />
        <input id="total-income" readonly /><br />

        <label>อัตราภาษี (%)</label><br />
        <input id="tax-ratio" readonly /><br />

        <label>ภาษีที่ต้องจ่าย (บาท)</label><br />
        <input id="tax" readonly />
      </form>
    </div>

    <script src="tax.js"></script>

    <br />
    <div id="box">
      <h2>Toggle Dark/Light Mode</h2>
      <h3>
        Click the button to toggle between dark and light mode for this page.
      </h3>
      <button onclick="darkMode()">Toggle dark mode</button>
    </div>
    <script src="darkMode.js"></script>
  </body>
</html>
