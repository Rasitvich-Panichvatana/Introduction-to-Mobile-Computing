<!doctype html>
<html>
  <head>
    <title>Hw3</title>
  </head>

  <body>
    <h2>โปรแกรมคำนวณภาษีเงินได้บุคคลธรรมดา</h2>

    <form>
      <label>รายได้ (บาท)</label><br />
      <input
        type="number"
        id="income"
        oninput="calculate()"
        onkeydown="return event.keyCode !== 69;"
      />
      <button type="button" onclick="add()">+</button>
      <button type="button" onclick="remove()">-</button>
      <br /><br />

      <input
        type="number"
        id="income2"
        style="display: none"
        oninput="calculate()"
        onkeydown="return event.keyCode !== 69;"
      /><br />

      <input
        type="number"
        id="income3"
        style="display: none"
        oninput="calculate()"
        onkeydown="return event.keyCode !== 69;"
      /><br /><br />

      <label>รายได้รวม (บาท)</label><br />
      <input id="total-income" readonly /><br />

      <label>อัตราภาษี (%)</label><br />
      <input id="tax-ratio" readonly /><br />

      <label>ภาษีที่ต้องจ่าย (บาท)</label><br />
      <input id="tax" readonly />
    </form>

    <script src="tax.js"></script>
  </body>
</html>
